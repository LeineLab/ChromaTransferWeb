<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chroma Transfer</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
           class="bi bi-send-fill me-2 text-primary" viewBox="0 0 16 16">
        <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083zm-1.833 1.89L6.637 10.07l-.215-.338L13.13 2.577z"/>
      </svg>
      Chroma Transfer
    </a>
    <div class="ms-auto d-flex align-items-center gap-2" id="userArea" style="display:none!important">
      <span class="text-secondary small" id="userName"></span>
      <a href="/auth/logout" class="btn btn-outline-secondary btn-sm" id="logoutBtn">Logout</a>
    </div>
  </div>
</nav>

<!-- ===== Main Layout ===== -->
<div class="container-fluid py-4">
  <div class="row g-4">

    <!-- ===== Left Column: Machines ===== -->
    <div class="col-md-4">
      <div class="card h-100">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span class="fw-semibold">Machines</span>
          <button class="btn btn-primary btn-sm" id="btnAddMachine">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                 class="bi bi-plus-lg" viewBox="0 0 16 16">
              <path fill-rule="evenodd"
                    d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
            </svg>
            Add
          </button>
        </div>
        <div class="card-body p-0">
          <ul class="list-group list-group-flush machine-list" id="machineList">
            <li class="list-group-item text-secondary text-center py-4" id="noMachinesMsg">
              No machines configured
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- ===== Right Column: Transfer ===== -->
    <div class="col-md-8">
      <div class="card">
        <div class="card-header fw-semibold">Send Embroidery File</div>
        <div class="card-body">

          <!-- File Drop Area -->
          <div class="upload-area mb-3" id="dropArea">
            <div class="upload-area-content text-center text-secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor"
                   class="bi bi-cloud-upload mb-2 text-primary opacity-75" viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                      d="M4.406 1.342A5.53 5.53 0 0 1 8 0c2.69 0 4.923 2 5.166 4.579C14.758 4.804 16 6.137 16 7.773 16 9.569 14.502 11 12.687 11H10a.5.5 0 0 1 0-1h2.688C13.979 10 15 8.988 15 7.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 2.825 10.328 1 8 1a4.53 4.53 0 0 0-2.941 1.1c-.757.652-1.153 1.438-1.153 2.055v.448l-.445.049C2.064 4.805 1 5.952 1 7.318 1 8.785 2.23 10 3.781 10H6a.5.5 0 0 1 0 1H3.781C1.708 11 0 9.366 0 7.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383"/>
                <path fill-rule="evenodd"
                      d="M7.646 4.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707V14.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708z"/>
              </svg>
              <p class="mb-1 fw-semibold">Drag &amp; drop a .DST or .DSB file here</p>
              <p class="small mb-2">or</p>
              <label for="fileInput" class="btn btn-outline-primary btn-sm">Browse file</label>
              <input type="file" id="fileInput" accept=".dst,.dsb,.DST,.DSB" class="d-none" />
            </div>
            <div class="upload-area-filename d-none" id="fileDisplay">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                   class="bi bi-file-earmark-text me-2 text-primary" viewBox="0 0 16 16">
                <path d="M5.5 7a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM5 9.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0 2a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5"/>
                <path d="M9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.5zm0 1v2A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z"/>
              </svg>
              <span id="fileNameText"></span>
              <button type="button" class="btn btn-link btn-sm text-secondary ms-2 p-0" id="btnClearFile">
                &times;
              </button>
            </div>
          </div>

          <!-- Machine selector + Name on machine -->
          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label for="machineSelect" class="form-label">Target Machine</label>
              <select class="form-select" id="machineSelect">
                <option value="">— select a machine —</option>
              </select>
            </div>
            <div class="col-sm-6">
              <label for="shortNameInput" class="form-label">
                Name on Machine
                <span class="text-secondary small">(max 8 chars)</span>
              </label>
              <input
                type="text"
                class="form-control"
                id="shortNameInput"
                maxlength="8"
                placeholder="auto"
              />
            </div>
          </div>

          <!-- Action buttons -->
          <div class="d-flex gap-2 mb-4">
            <button class="btn btn-primary" id="btnSend">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                   class="bi bi-send me-1" viewBox="0 0 16 16">
                <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493z"/>
              </svg>
              Send
            </button>
            <button class="btn btn-danger d-none" id="btnCancel">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                   class="bi bi-x-circle me-1" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
                <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
              </svg>
              Cancel
            </button>
          </div>

          <!-- Progress bar -->
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-1">
              <small class="text-secondary" id="progressLabel">Ready</small>
              <small class="text-secondary" id="progressPct">0%</small>
            </div>
            <div class="progress" style="height: 10px;">
              <div
                class="progress-bar progress-bar-striped progress-bar-animated"
                role="progressbar"
                id="progressBar"
                style="width: 0%"
                aria-valuenow="0"
                aria-valuemin="0"
                aria-valuemax="100"
              ></div>
            </div>
          </div>

          <!-- Log output -->
          <div>
            <div class="d-flex justify-content-between align-items-center mb-1">
              <small class="text-secondary">Transfer Log</small>
              <button class="btn btn-link btn-sm text-secondary p-0" id="btnClearLog">Clear</button>
            </div>
            <div class="log-area" id="logArea"></div>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<!-- ===== Machine Modal ===== -->
<div class="modal fade" id="machineModal" tabindex="-1" aria-labelledby="machineModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="machineModalLabel">Add Machine</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="modalMachineName" class="form-label">Machine Name</label>
          <input type="text" class="form-control" id="modalMachineName" placeholder="e.g. Embroidery 1" />
        </div>
        <div class="mb-3">
          <label for="modalMachineIp" class="form-label">IP Address</label>
          <input type="text" class="form-control" id="modalMachineIp" placeholder="192.168.1.100" />
        </div>
        <div class="text-danger small d-none" id="modalError"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="btnModalSave">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
